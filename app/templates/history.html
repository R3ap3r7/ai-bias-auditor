<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Audit History - AI Bias Auditor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css" />
  <link rel="stylesheet" href="/static/audit.css" />
</head>
<body>
  <nav class="audit-nav" aria-label="Audit history navigation">
    <div class="container">
      <div class="audit-nav-left">
        <a href="/audit" class="audit-home-link" aria-label="Back to audit workspace">Audit</a>
        <div class="audit-divider" aria-hidden="true"></div>
        <span class="audit-logo-text">AI Bias Auditor</span>
      </div>
    </div>
  </nav>

  <main class="container" style="padding:2rem 0 3rem;">
    <h1 class="audit-workspace-title">Audit History</h1>
    <p class="audit-workspace-sub">Stored audit artifacts from local persistent storage and Firestore when configured.</p>
    <div class="a-result-card" style="margin-top:1.5rem;">
      <div id="historyStatus" style="color:#a1a1aa;margin-bottom:1rem;">Loading history...</div>
      <div id="historyTable" class="table-container"></div>
    </div>
  </main>

  <script src="/static/history.js"></script>
</body>
</html>
