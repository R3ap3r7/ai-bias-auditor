name: ai_bias_auditor_flutter
description: Flutter and Firebase front end for the AI Bias Auditor governance platform.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cloud_firestore: ">=5.0.0 <7.0.0"
  cupertino_icons: ">=1.0.8 <2.0.0"
  firebase_auth: ">=5.0.0 <7.0.0"
  firebase_core: ">=3.0.0 <5.0.0"
  firebase_storage: ">=12.0.0"
  file_picker: ">=8.0.0 <11.0.0"
  http: ">=1.2.0 <3.0.0"
  intl: ">=0.19.0 <1.0.0"
  url_launcher: ">=6.2.0 <8.0.0"
  google_fonts: ^6.2.1
  visibility_detector: ^0.4.0+2
  dotted_border: ^2.1.0
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_lints: ">=4.0.0 <7.0.0"
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
